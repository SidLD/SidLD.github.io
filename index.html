<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced NWSSU GLB Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
        }
        
        header {
            text-align: center;
            padding: 15px 0;
            margin-bottom: 15px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .content {
            display: flex;
            flex: 1;
            gap: 15px;
        }
        
        .viewer-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .controls {
            width: 250px;
            background: rgba(25, 25, 45, 0.9);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #00dbde;
            position: relative;
            padding-bottom: 8px;
        }
        
        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            border-radius: 3px;
        }
        
        .dropdown {
            position: relative;
            width: 100%;
        }
        
        .dropdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(50, 50, 80, 0.6);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .dropdown-header:hover {
            background: rgba(70, 70, 100, 0.8);
        }
        
        .dropdown-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(40, 40, 65, 0.95);
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .dropdown.open .dropdown-options {
            max-height: 300px;
            opacity: 1;
        }
        
        .dropdown-option {
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .dropdown-option:hover {
            background: rgba(90, 90, 140, 0.8);
        }
        
        .dropdown-option.selected {
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            color: white;
        }
        
        .status {
            display: flex;
            align-items: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(30, 30, 50, 0.7);
            border-radius: 10px;
            border-left: 4px solid #00dbde;
        }
        
        .status-icon {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            border-radius: 50%;
            background: #00dbde;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }
        
        .loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 20, 0.9);
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(0, 219, 222, 0.3);
            border-top: 5px solid #00dbde;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .instructions {
            margin-top: 25px;
            padding: 15px;
            background: rgba(30, 30, 50, 0.5);
            border-radius: 10px;
            font-size: 0.95rem;
        }
        
        .instructions ul {
            padding-left: 20px;
            margin-top: 10px;
        }
        
        .instructions li {
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        .highlight {
            color: #00dbde;
            font-weight: bold;
        }
        
        .camera-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        .camera-btn {
            flex: 1;
            padding: 8px;
            background: rgba(50, 50, 80, 0.6);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .camera-btn:hover {
            background: rgba(70, 70, 100, 0.8);
        }
        
        .camera-btn.active {
            background: linear-gradient(90deg, #00dbde, #fc00ff);
        }
        
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }
            .controls {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Enhanced Campus Viewer</h1>
            <p class="subtitle">Improved perspective and lighting for better visualization</p>
        </header>
        
        <div class="content">
            <div class="viewer-container">
                <div id="canvas-container"></div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <h3>Loading Campus Model...</h3>
                    <p>Adjusting perspective and lighting</p>
                </div>
            </div>
            
            <div class="controls">

                
                <div class="control-group">
                    <h2>Camera Positions</h2>
                    <div class="dropdown" id="dropdown">
                        <div class="dropdown-header">
                            <span id="dropdown-text">Select Position</span>
                            <span>▼</span>
                        </div>
                        <div class="dropdown-options" id="dropdown-options"></div>
                    </div>
                    <button id="print-coordinates" class="camera-btn" style="margin-top: 15px; width: 100%;">
                        Print Current Coordinates
                    </button>
                    <div id="coordinate-status" style="margin-top: 10px; font-size: 0.9rem; color: #00dbde; text-align: center; opacity: 0; transition: opacity 0.3s;"></div>
                </div>
                

            </div>
        </div>
        

    </div>

    <script>
        // Main variables
        let scene, camera, renderer, controls;
        let model = null;
        
        // Camera configurations for different views
        const COORDINATES = {
            DEFAULT: {
                position: [0.7578, 4.6168, -6.4757],
                target: [12.8938, 2.2596, -5.5850],
            },
            CCIS: {
                position: [-11.4023, 3.1333, -6.5408],
                target: [-12.8938, 2.2596, -2.5850],
            },
            CRIM: {
                position: [-7.0789, 2.6126, -6.3270],
                target: [-12.8938, 2.2596, -5.5850],
            },
            COM: {
                position: [-1.5614, 5.0422, 0.7315],
                target: [12.8938, 2.2596, -5.5850],
            },
            DEFAULT2: {
                position: [-24.1283, 7.0082, -11.4318],
                target: [0.0000, 0.0000, 0.0000],
            }
        };
        
        // Camera positions for the old button system
        const CAMERA_POSITIONS = {
            DEFAULT: { position: [50, 50, 50], target: [0, 0, 0] },
            CCIS: { position: [-12.8938, 2.2596, -2.5850], target: [0, 0, 0] },
            FRONT: { position: [0, 25, 100], target: [0, 0, 0] },
            SIDE: { position: [100, 25, 0], target: [0, 0, 0] }
        };
        
        // Configuration options
        const LINE_CONFIGS = {
            PATH: {
                name: "Main Pathway",
                points: [
                    [-5, 0, -5],
                    [0, 0, 0],
                    [5, 0, 5],
                    [10, 0, 0]
                ],
                color: 0xff9900
            },
            BOUNDARY: {
                name: "Boundary",
                points: [
                    [-8, 0, -8],
                    [-8, 0, 8],
                    [8, 0, 8],
                    [8, 0, -8],
                    [-8, 0, -8]
                ],
                color: 0x00ffff
            },
            CONNECTION: {
                name: "Connections",
                points: [
                    [-5, 0, -5],
                    [0, 0, 0],
                    [5, 0, 5],
                    [-5, 0, 5],
                    [5, 0, -5]
                ],
                color: 0xff00ff
            }
        };
        
        // Initialize the scene
        function init() {
            
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0c0c1a);
            scene.fog = new THREE.Fog(0x0c0c1a, 10, 50);
            
            // Create camera with your coordinate system
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(...COORDINATES.DEFAULT.position);
            
            // Create renderer
            renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                alpha: true,
                logarithmicDepthBuffer: true // Better for large scenes
            });
            
            const container = document.getElementById('canvas-container');
            
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.shadowMap.enabled = false; // Temporarily disable shadows for debugging
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);
            
            // Add grid helper with larger size
            const gridHelper = new THREE.GridHelper(40, 20, 0x444466, 0x222244);
            gridHelper.position.y = -0.01;
            scene.add(gridHelper);
            
            // Enhanced lighting setup - MUCH BRIGHTER
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); // Increased from 0.6 to 1.0
            scene.add(ambientLight);
            
            // Main directional light - much brighter
            const directionalLight = new THREE.DirectionalLight(0xffffff, 2.0); // Increased from 1.0 to 2.0
            directionalLight.position.set(20, 30, 20);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // Additional fill light - brighter
            const fillLight = new THREE.DirectionalLight(0xffffff, 1.5); // Increased from 0.5 to 1.5
            fillLight.position.set(-20, 20, 20);
            scene.add(fillLight);
            
            // Back light to highlight edges - brighter
            const backLight = new THREE.DirectionalLight(0xffffff, 1.0); // Increased from 0.4 to 1.0
            backLight.position.set(10, 20, -20);
            scene.add(backLight);
            
            // Add extra bright light from above
            const topLight = new THREE.DirectionalLight(0xffffff, 1.5);
            topLight.position.set(0, 50, 0);
            scene.add(topLight);
            
            // Add orbit controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.maxDistance = 150;
            controls.minDistance = 2;
            controls.maxPolarAngle = Math.PI / 1.5; // Limit vertical rotation
            
            // Set the target to your default target position
            controls.target.set(...COORDINATES.DEFAULT.target);
            controls.update();
            
            // Handle window resize
            window.addEventListener('resize', onWindowResize, false);
            
            // Initialize UI components
            initDropdown();
            initCoordinatePrinter();
            
            // Load the model
            loadModel();
        }
        

        
        // Initialize coordinate printer
        function initCoordinatePrinter() {
            document.getElementById('print-coordinates').addEventListener('click', () => {
                const cameraPos = camera.position;
                const targetPos = controls.target;
                
                // Format coordinates for easy copying
                const cameraCoords = [cameraPos.x.toFixed(4), cameraPos.y.toFixed(4), cameraPos.z.toFixed(4)];
                const targetCoords = [targetPos.x.toFixed(4), targetPos.y.toFixed(4), targetPos.z.toFixed(4)];
                
                // Console output for debugging
                console.log('=== CURRENT COORDINATES ===');
                console.log('Camera Position:', cameraCoords);
                console.log('Target Position:', targetCoords);
                console.log('=== COORDINATE OBJECT FORMAT ===');
                console.log('const NEW_COORDINATE = {');
                console.log(`    position: [${cameraCoords.join(', ')}],`);
                console.log(`    target: [${targetCoords.join(', ')}],`);
                console.log('};');
                console.log('========================');
                
                // Alert for easy viewing
                const coordText = `Camera: [${cameraCoords.join(', ')}]\nTarget: [${targetCoords.join(', ')}]`;
                alert('Current Coordinates:\n\n' + coordText);
                
                // Show status message
                const statusDiv = document.getElementById('coordinate-status');
                statusDiv.textContent = 'Coordinates printed to console!';
                statusDiv.style.opacity = '1';
                
                // Hide status message after 3 seconds
                setTimeout(() => {
                    statusDiv.style.opacity = '0';
                }, 3000);
            });
        }
        
        // Animate camera to new position
        function animateCamera(config) {
            const duration = 1000;
            const startPosition = camera.position.clone();
            const startTarget = controls.target.clone();
            const endPosition = new THREE.Vector3(...config.position);
            const endTarget = new THREE.Vector3(...config.target);
            const startTime = Date.now();
            
            function updateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Smooth easing function
                const ease = progress < 0.5 
                    ? 4 * progress * progress * progress 
                    : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                
                camera.position.lerpVectors(startPosition, endPosition, ease);
                controls.target.lerpVectors(startTarget, endTarget, ease);
                controls.update();
                
                if (progress < 1) {
                    requestAnimationFrame(updateCamera);
                }
            }
            
            requestAnimationFrame(updateCamera);
        }
        
        // Animate camera to coordinate position
        function animateCameraToCoordinate(coordinateKey) {
            const coordinate = COORDINATES[coordinateKey];
            if (!coordinate) {
                return;
            }
            
            const duration = 1000;
            const startPosition = camera.position.clone();
            const startTarget = controls.target.clone();
            const endPosition = new THREE.Vector3(...coordinate.position);
            const endTarget = new THREE.Vector3(...coordinate.target);
            const startTime = Date.now();
            
            function updateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Smooth easing function
                const ease = progress < 0.5 
                    ? 4 * progress * progress * progress 
                    : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                
                camera.position.lerpVectors(startPosition, endPosition, ease);
                controls.target.lerpVectors(startTarget, endTarget, ease);
                controls.update();
                
                if (progress < 1) {
                    requestAnimationFrame(updateCamera);
                }
            }
            
            requestAnimationFrame(updateCamera);
        }
        
        // Load the GLB model
        function loadModel() {
            const loader = new THREE.GLTFLoader();
            
            // Use your GLB file - make sure this path is correct
            const modelUrl = 'nwssu.glb';
            
            loader.load(
                modelUrl,
                (gltf) => {
                    model = gltf.scene;
                    
                    // Don't center the model - use your original positioning
                    const bbox = new THREE.Box3().setFromObject(model);
                    const center = bbox.getCenter(new THREE.Vector3());
                    const size = bbox.getSize(new THREE.Vector3());
                    
                    // Keep original model position - don't center it
                    
                    // Scale the model to be larger and more visible
                    const maxDimension = Math.max(size.x, size.y, size.z);
                    const scale = 50 / maxDimension; // Much larger scale
                    model.scale.setScalar(scale);
                    
                    // Enable shadows for all meshes in the model
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    
                    // Add to scene
                    scene.add(model);
                    
                    // Update camera to look at the model
                    controls.target.set(0, 0, 0);
                    controls.update();
                    
                    // Hide loading screen
                    document.getElementById('loading').classList.add('hidden');
                    
                    // Force a render to make sure it's visible
                    renderer.render(scene, camera);
                },
                (xhr) => {
                    // Progress callback
                    const percent = Math.round((xhr.loaded / xhr.total) * 100);
                },
                (error) => {
                    // Error callback
                    document.getElementById('loading').classList.add('hidden');
                    
                    // Create a placeholder model
                    createPlaceholderModel();
                }
            );
        }
        
        // Create a placeholder model if loading fails
        function createPlaceholderModel() {
            
            // Create a simple building-like structure
            const geometry = new THREE.BoxGeometry(5, 3, 5);
            const material = new THREE.MeshLambertMaterial({ 
                color: 0x888888,
                transparent: true,
                opacity: 0.8
            });
            
            model = new THREE.Mesh(geometry, material);
            model.position.set(0, 1.5, 0);
            model.castShadow = true;
            model.receiveShadow = true;
            
            scene.add(model);
        }
        
        // Initialize dropdown menu
        function initDropdown() {
            const dropdown = document.getElementById('dropdown');
            const dropdownOptions = document.getElementById('dropdown-options');
            const dropdownText = document.getElementById('dropdown-text');
            
            // Add options to dropdown from COORDINATES
            Object.keys(COORDINATES).forEach(key => {
                const option = document.createElement('div');
                option.className = 'dropdown-option';
                option.textContent = key;
                option.dataset.key = key;
                
                option.addEventListener('click', () => {
                    // Update selected option
                    document.querySelectorAll('.dropdown-option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    option.classList.add('selected');
                    
                    // Update dropdown text
                    dropdownText.textContent = key;
                    
                    // Animate camera to the selected coordinate
                    animateCameraToCoordinate(key);
                    
                    // Close dropdown
                    dropdown.classList.remove('open');
                });
                
                dropdownOptions.appendChild(option);
            });
            
            // Open/close dropdown
            dropdown.querySelector('.dropdown-header').addEventListener('click', () => {
                dropdown.classList.toggle('open');
            });
            
            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('open');
                }
            });
        }
        

        
        // Handle window resize
        function onWindowResize() {
            camera.aspect = document.getElementById('canvas-container').offsetWidth / 
                            document.getElementById('canvas-container').offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(document.getElementById('canvas-container').offsetWidth, 
                            document.getElementById('canvas-container').offsetHeight);
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Initialize and start the application
        init();
        animate();
    </script>
</body>
</html>
