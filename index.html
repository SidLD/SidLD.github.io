<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigator Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Loading Screen */
        .loading {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(6, 182, 212, 0.3);
            border-top: 4px solid #06b6d4;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .loading p {
            color: #94a3b8;
            text-align: center;
            max-width: 320px;
        }

        /* Mobile Widget */
        .mobile-widget {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            z-index: 40;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 12px;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .widget-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }

        .tab-buttons {
            display: flex;
            gap: 4px;
        }

        .tab-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .tab-btn.active {
            background: linear-gradient(90deg, #06b6d4, #8b5cf6);
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(71, 85, 105, 0.3);
            color: white;
        }

        .expand-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .expand-btn:hover {
            background: rgba(71, 85, 105, 0.3);
            color: white;
        }

        .widget-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .widget-content.expanded {
            max-height: 320px;
        }

        .widget-content-inner {
            padding: 16px;
            max-height: 320px;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .tab-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #06b6d4;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 0.75rem;
            color: #cbd5e1;
            margin-bottom: 4px;
            display: block;
        }

        .form-select {
            width: 100%;
            padding: 8px;
            font-size: 0.75rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            touch-action: manipulation;
        }

        .form-select:focus {
            outline: none;
            border-color: #06b6d4;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .btn-primary {
            background: linear-gradient(90deg, #06b6d4, #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(90deg, #0891b2, #7c3aed);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.6);
            color: white;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.8);
        }

        .btn-success {
            background: rgba(34, 197, 94, 0.6);
            color: white;
        }

        .btn-success:hover {
            background: rgba(34, 197, 94, 0.8);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #475569;
            color: white;
        }

        .btn-outline:hover {
            background: rgba(71, 85, 105, 0.3);
        }

        .status-panel {
            background: #1e293b;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-bottom: 12px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .status-row:last-child {
            margin-bottom: 0;
        }

        .status-label {
            color: #cbd5e1;
        }

        .status-value {
            color: #06b6d4;
        }

        .camera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .path-list {
            max-height: 160px;
            overflow-y: auto;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 12px;
        }

        .path-item {
            background: rgba(71, 85, 105, 0.3);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.75rem;
        }

        .path-item:last-child {
            margin-bottom: 0;
        }

        .path-title {
            font-weight: 600;
            color: #06b6d4;
            margin-bottom: 2px;
        }

        .path-subtitle {
            color: #cbd5e1;
            font-size: 0.6875rem;
        }

        /* Status Bar (when collapsed) */
        .status-bar {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 30;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 8px;
            padding: 8px;
            display: none;
        }

        .status-bar.visible {
            display: block;
        }

        .status-bar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: white;
        }

        .status-route {
            color: #06b6d4;
        }

        .status-progress {
            color: #22c55e;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .mobile-widget {
                left: 8px;
                right: 8px;
                bottom: 8px;
            }

            .status-bar {
                left: 8px;
                right: 8px;
                top: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <h3>Loading Campus Model...</h3>
        <p>Loading locations and paths...</p>
    </div>

    <!-- Mobile Widget -->
    <div class="mobile-widget" id="mobile-widget">
        <!-- Widget Header -->
        <div class="widget-header">
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="camera" title="Camera">📷</button>
                <button class="tab-btn" data-tab="navigation" title="Navigation">🧭</button>
                <button class="tab-btn" data-tab="person" title="Person">🚶</button>
                <button class="tab-btn" data-tab="paths" title="Paths">🛤️</button>
            </div>
            <button class="expand-btn" id="expand-btn">▲</button>
        </div>

        <!-- Widget Content -->
        <div class="widget-content" id="widget-content">
            <div class="widget-content-inner">
                <!-- Camera Tab -->
                <div class="tab-content active" id="camera-tab">
                    <div class="tab-title">Camera Positions</div>
                    <div class="camera-grid" id="camera-grid">
                        <!-- Camera buttons will be populated here -->
                    </div>
                </div>

                <!-- Navigation Tab -->
                <div class="tab-content" id="navigation-tab">
                    <div class="tab-title">Navigation</div>
                    <div class="form-group">
                        <label class="form-label">From:</label>
                        <select class="form-select" id="from-select">
                            <option value="">Select Start Point</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">To:</label>
                        <select class="form-select" id="to-select">
                            <option value="">Select End Point</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="generate-path-btn">Generate Path</button>
                        <button class="btn btn-danger" id="clear-path-btn">Clear</button>
                    </div>
                </div>

                <!-- Person Tab -->
                <div class="tab-content" id="person-tab">
                    <div class="tab-title">Person Control</div>
                    <div class="btn-group">
                        <button class="btn btn-success" id="walk-btn">🚶 Walk</button>
                        <button class="btn btn-outline" id="reset-btn">🔄 Reset</button>
                    </div>
                    <div class="status-panel" id="person-status">
                        <div class="status-row">
                            <span class="status-label">Progress:</span>
                            <span class="status-value" id="progress-value">0%</span>
                        </div>
                        <div class="status-row">
                            <span class="status-label">Height:</span>
                            <span class="status-value" id="height-value">0.00</span>
                        </div>
                        <div class="status-row">
                            <span class="status-label">Path:</span>
                            <span class="status-value" id="path-type-value">No path</span>
                        </div>
                        <div class="status-row" id="path-id-row" style="display: none;">
                            <span class="status-label">ID:</span>
                            <span class="status-value" id="path-id-value">None</span>
                        </div>
                    </div>
                </div>

                <!-- Paths Tab -->
                <div class="tab-content" id="paths-tab">
                    <div class="tab-title">Available Paths</div>
                    <div class="btn-group">
                        <button class="btn btn-outline" id="reload-btn">Reload Data</button>
                        <button class="btn btn-outline" id="show-all-btn">Show All</button>
                    </div>
                    <div class="path-list" id="path-list">
                        <div style="text-align: center; color: #94a3b8; padding: 20px;">Loading paths...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar (when collapsed) -->
    <div class="status-bar" id="status-bar">
        <div class="status-bar-content">
            <span class="status-route" id="status-route">No route selected</span>
            <span class="status-progress" id="status-progress">0%</span>
        </div>
    </div>

    <script>
        // Global variables
        let scene, camera, renderer, controls;
        let model = null;
        let currentPath = null;
        let pathLine = null;
        let personModel = null;
        let isWalking = false;
        let walkingProgress = 0;
        let selectedFromPoint = null;
        let selectedToPoint = null;
        let allPathLines = [];
        let isExpanded = false;
        let activeTab = 'camera';

        // Data storage
        let CAMPUS_LOCATIONS = {};
        let LOCATION_ID_MAP = {};
        let PREDEFINED_PATHS = {};

        // Camera configurations
        const COORDINATES = {
            DEFAULT: { position: [0.7578, 4.6168, -6.4757], target: [12.8938, 2.2596, -5.5850] },
            CCIS: { position: [-11.4023, 3.1333, -6.5408], target: [-12.8938, 2.2596, -2.5850] },
            CRIM: { position: [-7.0789, 2.6126, -6.3270], target: [-12.8938, 2.2596, -5.5850] },
            COM: { position: [-1.5614, 5.0422, 0.7315], target: [12.8938, 2.2596, -5.5850] },
            DEFAULT2: { position: [-24.1283, 7.0082, -11.4318], target: [0.0000, 0.0000, 0.0000] }
        };

        // Sample data (replace with your actual path.json)
        const SAMPLE_DATA = {
            "locations": {
                "Laboratory": { "name": "Laboratory Building", "x": -15.2, "y": 0.5, "z": -8.1 },
                "TennisPark": { "name": "Tennis Park", "x": -12.8, "y": 0.3, "z": -2.5 },
                "CCIS": { "name": "CCIS Building", "x": -8.5, "y": 0.4, "z": -6.2 },
                "CRIM": { "name": "CRIM Building", "x": -5.2, "y": 0.3, "z": -4.8 },
                "COM": { "name": "COM Building", "x": 2.1, "y": 0.5, "z": 1.2 },
                "MainGate": { "name": "Main Gate", "x": 0.0, "y": 0.2, "z": 0.0 }
            },
            "paths": {
                "Laboratory_TennisPark": {
                    "path": [
                        { "x": -15.2, "y": 0.5, "z": -8.1 },
                        { "x": -14.8, "y": 0.4, "z": -7.2 },
                        { "x": -14.1, "y": 0.4, "z": -6.1 },
                        { "x": -13.5, "y": 0.3, "z": -4.8 },
                        { "x": -12.8, "y": 0.3, "z": -2.5 }
                    ]
                },
                "TennisPark_CCIS": {
                    "path": [
                        { "x": -12.8, "y": 0.3, "z": -2.5 },
                        { "x": -11.2, "y": 0.35, "z": -3.8 },
                        { "x": -9.8, "y": 0.4, "z": -5.2 },
                        { "x": -8.5, "y": 0.4, "z": -6.2 }
                    ]
                },
                "CCIS_CRIM": {
                    "path": [
                        { "x": -8.5, "y": 0.4, "z": -6.2 },
                        { "x": -7.2, "y": 0.35, "z": -5.8 },
                        { "x": -6.1, "y": 0.3, "z": -5.2 },
                        { "x": -5.2, "y": 0.3, "z": -4.8 }
                    ]
                }
            }
        };

        // Initialize the application
        function init() {
            initScene();
            initUI();
            loadDataFromJSON();
            animate();
        }

        // Initialize Three.js scene
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0c0c1a);
            scene.fog = new THREE.Fog(0x0c0c1a, 10, 50);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(...COORDINATES.DEFAULT.position);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            const container = document.getElementById('canvas-container');
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Grid
            const gridHelper = new THREE.GridHelper(40, 20, 0x444466, 0x222244);
            gridHelper.position.y = -0.01;
            scene.add(gridHelper);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 2.0);
            directionalLight.position.set(20, 30, 20);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.maxDistance = 150;
            controls.minDistance = 2;
            controls.maxPolarAngle = Math.PI / 1.5;
            controls.target.set(...COORDINATES.DEFAULT.target);
            controls.update();

            // Create person model
            personModel = createPersonModel();
            scene.add(personModel);

            // Load 3D model
            loadModel();

            // Handle window resize
            window.addEventListener('resize', onWindowResize, false);
        }

        // Initialize UI
        function initUI() {
            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            // Expand/collapse widget
            document.getElementById('expand-btn').addEventListener('click', toggleWidget);

            // Camera buttons
            populateCameraButtons();

            // Navigation controls
            document.getElementById('generate-path-btn').addEventListener('click', generatePath);
            document.getElementById('clear-path-btn').addEventListener('click', clearPath);

            // Person controls
            document.getElementById('walk-btn').addEventListener('click', startWalking);
            document.getElementById('reset-btn').addEventListener('click', resetPerson);

            // Path controls
            document.getElementById('reload-btn').addEventListener('click', loadDataFromJSON);
            document.getElementById('show-all-btn').addEventListener('click', showAllPaths);

            // Location selects
            document.getElementById('from-select').addEventListener('change', (e) => {
                selectedFromPoint = e.target.value || null;
                updateStatusBar();
            });

            document.getElementById('to-select').addEventListener('change', (e) => {
                selectedToPoint = e.target.value || null;
                updateStatusBar();
            });
        }

        // Switch tabs
        function switchTab(tabName) {
            activeTab = tabName;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });

            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === `${tabName}-tab`);
            });

            // Expand if collapsed
            if (!isExpanded) {
                toggleWidget();
            }
        }

        // Toggle widget expand/collapse
        function toggleWidget() {
            isExpanded = !isExpanded;
            const content = document.getElementById('widget-content');
            const expandBtn = document.getElementById('expand-btn');
            const statusBar = document.getElementById('status-bar');

            if (isExpanded) {
                content.classList.add('expanded');
                expandBtn.textContent = '▼';
                statusBar.classList.remove('visible');
            } else {
                content.classList.remove('expanded');
                expandBtn.textContent = '▲';
                if (currentPath) {
                    statusBar.classList.add('visible');
                }
            }
        }

        // Populate camera buttons
        function populateCameraButtons() {
            const grid = document.getElementById('camera-grid');
            Object.keys(COORDINATES).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-outline';
                btn.textContent = key;
                btn.addEventListener('click', () => animateCameraToCoordinate(key));
                grid.appendChild(btn);
            });
        }

        // Load data from JSON
        async function loadDataFromJSON() {
            try {
                // Try to load from path.json, fallback to sample data
                let data;
                try {
                    const response = await fetch('./path.json');
                    if (response.ok) {
                        data = await response.json();
                    } else {
                        throw new Error('Failed to load path.json');
                    }
                } catch (error) {
                    console.log('Using sample data');
                    data = SAMPLE_DATA;
                }

                // Load locations
                if (data.locations) {
                    CAMPUS_LOCATIONS = {};
                    LOCATION_ID_MAP = {};
                    
                    Object.entries(data.locations).forEach(([locationKey, locationData]) => {
                        const displayName = locationData.name || locationKey;
                        CAMPUS_LOCATIONS[displayName] = {
                            x: locationData.x,
                            y: locationData.y,
                            z: locationData.z
                        };
                        LOCATION_ID_MAP[displayName] = locationKey;
                    });
                }

                // Load paths
                if (data.paths) {
                    PREDEFINED_PATHS = {};
                    Object.entries(data.paths).forEach(([pathKey, pathData]) => {
                        PREDEFINED_PATHS[pathKey] = pathData.path;
                    });
                }

                // Update UI
                updateLocationDropdowns();
                updatePathList();
                addCampusPointMarkers();

                // Position person at first location
                const firstLocationName = Object.keys(CAMPUS_LOCATIONS)[0];
                if (firstLocationName && personModel) {
                    const firstPoint = CAMPUS_LOCATIONS[firstLocationName];
                    personModel.position.set(firstPoint.x, firstPoint.y, firstPoint.z);
                    updatePersonStatus();
                }

            } catch (error) {
                console.error('Error loading data:', error);
                updatePathListWithError();
            }
        }

        // Update location dropdowns
        function updateLocationDropdowns() {
            const fromSelect = document.getElementById('from-select');
            const toSelect = document.getElementById('to-select');
            
            // Clear existing options (keep first option)
            fromSelect.innerHTML = '<option value="">Select Start Point</option>';
            toSelect.innerHTML = '<option value="">Select End Point</option>';

            Object.keys(CAMPUS_LOCATIONS).forEach(locationName => {
                const fromOption = document.createElement('option');
                fromOption.value = locationName;
                fromOption.textContent = locationName;
                fromSelect.appendChild(fromOption);

                const toOption = document.createElement('option');
                toOption.value = locationName;
                toOption.textContent = locationName;
                toSelect.appendChild(toOption);
            });
        }

        // Update path list
        function updatePathList() {
            const listContainer = document.getElementById('path-list');
            
            if (Object.keys(PREDEFINED_PATHS).length === 0) {
                listContainer.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 20px;">No paths loaded</div>';
                return;
            }

            listContainer.innerHTML = '';
            Object.entries(PREDEFINED_PATHS).forEach(([pathKey, pathPoints]) => {
                const [fromKey, toKey] = pathKey.split('_');
                const fromName = getLocationNameByKey(fromKey) || fromKey;
                const toName = getLocationNameByKey(toKey) || toKey;

                const item = document.createElement('div');
                item.className = 'path-item';
                item.innerHTML = `
                    <div class="path-title">🛤️ ${pathKey}</div>
                    <div class="path-subtitle">${fromName} → ${toName} (${pathPoints.length} waypoints)</div>
                `;
                listContainer.appendChild(item);
            });
        }

        // Update path list with error
        function updatePathListWithError() {
            const listContainer = document.getElementById('path-list');
            listContainer.innerHTML = `
                <div style="text-align: center; color: #94a3b8; padding: 20px;">
                    <p>❌ Could not load path.json</p>
                    <p style="font-size: 0.6875rem; margin-top: 8px;">Using sample data instead</p>
                </div>
            `;
        }

        // Get location name by key
        function getLocationNameByKey(key) {
            for (const [displayName, locationKey] of Object.entries(LOCATION_ID_MAP)) {
                if (locationKey === key) {
                    return displayName;
                }
            }
            return null;
        }

        // Generate path
        function generatePath() {
            if (!selectedFromPoint || !selectedToPoint) {
                alert('Please select both start and end points');
                return;
            }

            if (selectedFromPoint === selectedToPoint) {
                alert('Start and end points cannot be the same');
                return;
            }

            clearPath();

            // Find predefined path
            const pathResult = findPredefinedPath(selectedFromPoint, selectedToPoint);
            
            if (pathResult) {
                const pathCoordinates = pathResult.path.map(point => 
                    new THREE.Vector3(point.x, point.y + 0.02, point.z)
                );
                createPathVisualization(pathCoordinates);
                currentPath = pathCoordinates;
                updatePathStatus('✅ Using custom path', pathResult.pathId + (pathResult.reversed ? ' (reversed)' : ''));
            } else {
                // Fallback to direct path
                const startPoint = CAMPUS_LOCATIONS[selectedFromPoint];
                const endPoint = CAMPUS_LOCATIONS[selectedToPoint];
                
                if (startPoint && endPoint) {
                    const pathCoordinates = [
                        new THREE.Vector3(startPoint.x, startPoint.y + 0.02, startPoint.z),
                        new THREE.Vector3(endPoint.x, endPoint.y + 0.02, endPoint.z)
                    ];
                    createPathVisualization(pathCoordinates);
                    currentPath = pathCoordinates;
                    updatePathStatus('⚠️ Direct path (no custom path)', 'Direct line');
                }
            }

            updateStatusBar();
        }

        // Find predefined path
        function findPredefinedPath(fromLocation, toLocation) {
            const fromKey = LOCATION_ID_MAP[fromLocation];
            const toKey = LOCATION_ID_MAP[toLocation];

            if (!fromKey || !toKey) {
                return null;
            }

            // Try direct path
            const directPathId = `${fromKey}_${toKey}`;
            if (PREDEFINED_PATHS[directPathId]) {
                return {
                    pathId: directPathId,
                    path: PREDEFINED_PATHS[directPathId],
                    reversed: false
                };
            }

            // Try reverse path
            const reversePathId = `${toKey}_${fromKey}`;
            if (PREDEFINED_PATHS[reversePathId]) {
                return {
                    pathId: reversePathId,
                    path: [...PREDEFINED_PATHS[reversePathId]].reverse(),
                    reversed: true
                };
            }

            return null;
        }

        // Create path visualization
        function createPathVisualization(pathCoordinates) {
            const curve = new THREE.CatmullRomCurve3(pathCoordinates);
            const tubeGeometry = new THREE.TubeGeometry(curve, pathCoordinates.length * 2, 0.02, 8, false);
            const tubeMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xff0000, 
                transparent: true, 
                opacity: 0.9 
            });
            
            pathLine = new THREE.Mesh(tubeGeometry, tubeMaterial);
            scene.add(pathLine);
        }

        // Clear path
        function clearPath() {
            isWalking = false;
            walkingProgress = 0;
            
            if (pathLine) {
                scene.remove(pathLine);
                pathLine = null;
            }
            
            allPathLines.forEach(line => scene.remove(line));
            allPathLines = [];
            
            currentPath = null;
            updatePathStatus('No path', 'None');
            updatePersonStatus();
            updateStatusBar();
        }

        // Start walking
        function startWalking() {
            if (currentPath && currentPath.length > 0) {
                isWalking = true;
                walkingProgress = 0;
                updatePersonStatus();
            } else {
                alert('Please generate a path first!');
            }
        }

        // Reset person
        function resetPerson() {
            isWalking = false;
            walkingProgress = 0;
            
            const firstLocationName = Object.keys(CAMPUS_LOCATIONS)[0];
            if (firstLocationName && personModel) {
                const firstPoint = CAMPUS_LOCATIONS[firstLocationName];
                personModel.position.set(firstPoint.x, firstPoint.y, firstPoint.z);
            }
            
            updatePersonStatus();
            updateStatusBar();
        }

        // Show all paths
        function showAllPaths() {
            allPathLines.forEach(line => scene.remove(line));
            allPathLines = [];

            if (Object.keys(PREDEFINED_PATHS).length === 0) {
                alert('No paths loaded to display');
                return;
            }

            const colors = [0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff, 0xffa500];
            
            Object.entries(PREDEFINED_PATHS).forEach(([pathId, pathPoints], index) => {
                const pathCoordinates = pathPoints.map(point => 
                    new THREE.Vector3(point.x, point.y + 0.02, point.z)
                );
                
                if (pathCoordinates.length > 1) {
                    const curve = new THREE.CatmullRomCurve3(pathCoordinates);
                    const tubeGeometry = new THREE.TubeGeometry(curve, pathCoordinates.length * 2, 0.015, 8, false);
                    const color = colors[index % colors.length];
                    const tubeMaterial = new THREE.MeshBasicMaterial({ 
                        color: color, 
                        transparent: true, 
                        opacity: 0.6 
                    });
                    
                    const pathLine = new THREE.Mesh(tubeGeometry, tubeMaterial);
                    scene.add(pathLine);
                    allPathLines.push(pathLine);
                }
            });

            alert(`Displaying ${allPathLines.length} loaded paths in different colors`);
        }

        // Create person model
        function createPersonModel() {
            const personGroup = new THREE.Group();

            // Body
            const bodyGeometry = new THREE.CylinderGeometry(0.03, 0.04, 0.12, 8);
            const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0x4169E1 });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.06;
            personGroup.add(body);

            // Head
            const headGeometry = new THREE.SphereGeometry(0.025, 8, 6);
            const headMaterial = new THREE.MeshLambertMaterial({ color: 0xFFDBB5 });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 0.145;
            personGroup.add(head);

            // Arms
            const armGeometry = new THREE.CylinderGeometry(0.008, 0.008, 0.08, 6);
            const armMaterial = new THREE.MeshLambertMaterial({ color: 0xFFDBB5 });
            
            const leftArm = new THREE.Mesh(armGeometry, armMaterial);
            leftArm.position.set(-0.045, 0.08, 0);
            leftArm.rotation.z = 0.3;
            personGroup.add(leftArm);

            const rightArm = new THREE.Mesh(armGeometry, armMaterial);
            rightArm.position.set(0.045, 0.08, 0);
            rightArm.rotation.z = -0.3;
            personGroup.add(rightArm);

            // Legs
            const legGeometry = new THREE.CylinderGeometry(0.01, 0.01, 0.08, 6);
            const legMaterial = new THREE.MeshLambertMaterial({ color: 0x2F4F4F });
            
            const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
            leftLeg.position.set(-0.015, -0.04, 0);
            personGroup.add(leftLeg);

            const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
            rightLeg.position.set(0.015, -0.04, 0);
            personGroup.add(rightLeg);

            return personGroup;
        }

        // Add campus point markers
        function addCampusPointMarkers() {
            // Clear existing markers
            const existingMarkers = scene.children.filter(child => child.userData.isMarker);
            existingMarkers.forEach(marker => scene.remove(marker));

            Object.entries(CAMPUS_LOCATIONS).forEach(([name, point]) => {
                // Marker sphere
                const geometry = new THREE.SphereGeometry(0.05, 8, 6);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x06b6d4, 
                    transparent: true, 
                    opacity: 0.8 
                });
                const marker = new THREE.Mesh(geometry, material);
                marker.position.set(point.x, point.y + 0.05, point.z);
                marker.userData = { name: name, isMarker: true };
                scene.add(marker);

                // Text label
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = 256;
                canvas.height = 64;
                context.fillStyle = '#ffffff';
                context.font = '16px Arial';
                context.textAlign = 'center';
                context.fillText(name, 128, 40);

                const texture = new THREE.CanvasTexture(canvas);
                const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(spriteMaterial);
                sprite.position.set(point.x, point.y + 0.2, point.z);
                sprite.scale.set(0.4, 0.1, 1);
                sprite.userData = { name: name, isMarker: true };
                scene.add(sprite);
            });
        }

        // Load 3D model
        function loadModel() {
            const loader = new THREE.GLTFLoader();
            
            // Try to load the model, create placeholder if it fails
            loader.load(
                'nwssu.glb',
                (gltf) => {
                    model = gltf.scene;
                    const bbox = new THREE.Box3().setFromObject(model);
                    const size = bbox.getSize(new THREE.Vector3());
                    const maxDimension = Math.max(size.x, size.y, size.z);
                    const scale = 50 / maxDimension;
                    model.scale.setScalar(scale);

                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    scene.add(model);
                    document.getElementById('loading').classList.add('hidden');
                },
                (xhr) => {
                    // Progress callback
                },
                (error) => {
                    console.log('Model loading failed, creating placeholder');
                    createPlaceholderModel();
                    document.getElementById('loading').classList.add('hidden');
                }
            );
        }

        // Create placeholder model
        function createPlaceholderModel() {
            const geometry = new THREE.BoxGeometry(5, 3, 5);
            const material = new THREE.MeshLambertMaterial({ 
                color: 0x888888, 
                transparent: true, 
                opacity: 0.8 
            });
            model = new THREE.Mesh(geometry, material);
            model.position.set(0, 1.5, 0);
            scene.add(model);
        }

        // Animate camera to coordinate
        function animateCameraToCoordinate(coordinateKey) {
            const coordinate = COORDINATES[coordinateKey];
            if (!coordinate) return;

            const duration = 1000;
            const startPosition = camera.position.clone();
            const startTarget = controls.target.clone();
            const endPosition = new THREE.Vector3(...coordinate.position);
            const endTarget = new THREE.Vector3(...coordinate.target);
            const startTime = Date.now();

            function updateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = progress < 0.5 
                    ? 4 * progress * progress * progress
                    : 1 - Math.pow(-2 * progress + 2, 3) / 2;

                camera.position.lerpVectors(startPosition, endPosition, ease);
                controls.target.lerpVectors(startTarget, endTarget, ease);
                controls.update();

                if (progress < 1) {
                    requestAnimationFrame(updateCamera);
                }
            }

            requestAnimationFrame(updateCamera);
        }

        // Update status functions
        function updatePathStatus(pathType, pathId) {
            document.getElementById('path-type-value').textContent = pathType;
            document.getElementById('path-id-value').textContent = pathId;
            document.getElementById('path-id-row').style.display = pathId !== 'None' ? 'flex' : 'none';
        }

        function updatePersonStatus() {
            document.getElementById('progress-value').textContent = Math.round(walkingProgress * 100) + '%';
            document.getElementById('height-value').textContent = personModel ? personModel.position.y.toFixed(2) : '0.00';
        }

        function updateStatusBar() {
            const statusBar = document.getElementById('status-bar');
            const routeElement = document.getElementById('status-route');
            const progressElement = document.getElementById('status-progress');

            if (selectedFromPoint && selectedToPoint) {
                routeElement.textContent = `${selectedFromPoint} → ${selectedToPoint}`;
                progressElement.textContent = Math.round(walkingProgress * 100) + '%';
                
                if (!isExpanded && currentPath) {
                    statusBar.classList.add('visible');
                }
            } else {
                routeElement.textContent = 'No route selected';
                progressElement.textContent = '0%';
                statusBar.classList.remove('visible');
            }
        }

        // Window resize handler
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Animate person walking
            if (isWalking && currentPath && currentPath.length > 1) {
                walkingProgress += 0.005;
                
                if (walkingProgress >= 1) {
                    walkingProgress = 1;
                    isWalking = false;
                }

                const totalLength = currentPath.length - 1;
                const scaledProgress = walkingProgress * totalLength;
                const index = Math.floor(scaledProgress);
                const fraction = scaledProgress - index;

                if (index < currentPath.length - 1) {
                    const start = currentPath[index];
                    const end = currentPath[index + 1];
                    
                    personModel.position.lerpVectors(start, end, fraction);
                    
                    // Look at direction
                    const direction = new THREE.Vector3().subVectors(end, start).normalize();
                    if (direction.length() > 0) {
                        personModel.lookAt(personModel.position.clone().add(direction));
                    }

                    // Walking bob
                    const bobOffset = Math.sin(Date.now() * 0.01) * 0.01;
                    personModel.position.y += bobOffset;

                    updatePersonStatus();
                    updateStatusBar();
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Start the application
        init();
    </script>
</body>
